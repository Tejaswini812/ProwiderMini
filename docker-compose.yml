services:
  postgres:
    image: postgres:16-alpine
    container_name: prowider-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prowider_leads
    ports:
      - "5432:5432"
    volumes:
      - prowider_pg_data:/var/lib/postgresql/data

volumes:
  prowider_pg_data:
